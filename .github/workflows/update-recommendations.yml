name: Update Movie Recommendations

on:
  schedule:
    # Run daily at 00:00 UTC (midnight)
    - cron: '0 0 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  update-recommendations:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        # Allow pushing back to the repository
        token: ${{ secrets.PERSONAL_TOKEN }}
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests
    
    - name: Run Reddit data fetcher
      env:
        CLIENT_ID: ${{ secrets.CLIENT_ID }}
        CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
        REDDIT_USERNAME: ${{ secrets.REDDIT_USERNAME }}
        PASSWORD: ${{ secrets.PASSWORD }}
      run: python rec.py
    
    - name: Run genre data fetcher
      env:
        CLIENT_ID: ${{ secrets.CLIENT_ID }}
        CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
        REDDIT_USERNAME: ${{ secrets.REDDIT_USERNAME }}
        PASSWORD: ${{ secrets.PASSWORD }}
      run: python genre.py
    
    - name: Run movie ranking processor
      env:
        OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      run: python ranking.py
    
    - name: Check for changes
      id: verify-changed-files
      run: |
        if [ -n "$(git status --porcelain)" ]; then
          echo "files_changed=true" >> $GITHUB_OUTPUT
        else
          echo "files_changed=false" >> $GITHUB_OUTPUT
        fi
    
    - name: Commit and push changes
      if: steps.verify-changed-files.outputs.files_changed == 'true'
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        
        # Add files that exist
        for file in rectoday.json recmonth.json todayranked.json monthranked.json comedy.json sad.json horror.json romance.json thriller.json sk.json comedyranked.json sadranked.json horrorranked.json romanceranked.json thrillerranked.json skranked.json; do
          if [ -f "$file" ]; then
            git add "$file"
          fi
        done
        
        git commit -m "Update movie recommendations [automated]"
        git push
